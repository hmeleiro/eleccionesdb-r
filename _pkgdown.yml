url: ~
template:
  bootstrap: 5
  light-switch: false
  bslib:
    # Match Spain Electoral Project design tokens
    primary: "#2d5bff"
    secondary: "#5a5a7a"
    success: "#0d9488"
    warning: "#d97706"
    info: "#2563eb"
    bg: "#fafbfc"
    fg: "#1a1a2e"
    body-bg: "#fafbfc"
    body-color: "#1a1a2e"
    link-color: "#2d5bff"
    link-hover-color: "#1a45e0"
    border-color: "#e5e7eb"
    code-bg: "#eef2ff"
    base_font:
      google: "Inter"
    heading_font:
      google: "Inter"
    code_font:
      google: "JetBrains Mono"
  includes:
    in_header: <link rel="preconnect" href="https://fonts.googleapis.com">

navbar:
  bg: "#ffffff"
  type: light
  structure:
    left: [intro, reference, articles]
    right: [search, github]

articles:
  - title: Primeros pasos
    contents:
      - introduccion
  - title: Guías
    contents:
      - datos-maestros
      - analisis-resultados
      - voto-exterior-cera
  - title: Avanzado
    contents:
      - autodespliegue

reference:
  - title: Elecciones
    contents:
      - get_tipos_eleccion
      - get_tipo_eleccion
      - get_elecciones
      - get_eleccion
  - title: Territorios
    contents:
      - get_territorios
      - get_territorio
      - get_territorio_hijos
  - title: Partidos
    contents:
      - get_partidos
      - get_partido
      - get_partidos_recode
      - get_partido_recode
  - title: Resultados
    contents:
      - get_totales_territorio_eleccion
      - get_resultado_completo
      - get_resultados
      - get_totales_territorio
      - get_votos_partido
  - title: Voto exterior (CERA)
    contents:
      - get_cera_resumen
      - get_cera_votos
  - title: Utilidades
    contents:
      - get_health
  - title: Configuración avanzada
    desc: >
      Funciones para apuntar el paquete a una instancia propia de la API.
      Ver `vignette("autodespliegue")` para más detalles.
    contents:
      - edb_set_base_url
      - edb_get_base_url
