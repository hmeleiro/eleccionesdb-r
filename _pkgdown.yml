url: https://hmeleiro.github.io/eleccionesdb-r
template:
  package: spainelectoraltheme
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]

articles:
  - title: Primeros pasos
    contents:
      - introduccion
  - title: Guías
    contents:
      - datos-maestros
      - analisis-resultados
      - voto-exterior-cera
  - title: Avanzado
    contents:
      - autodespliegue
      - autenticacion-api-key

reference:
  - title: Elecciones
    contents:
      - get_tipos_eleccion
      - get_tipo_eleccion
      - get_elecciones
      - get_eleccion
  - title: Territorios
    contents:
      - get_territorios
      - get_territorio
      - get_territorio_hijos
  - title: Partidos
    contents:
      - get_partidos
      - get_partido
      - get_partidos_recode
      - get_partido_recode
  - title: Resultados
    contents:
      - get_totales_territorio_eleccion
      - get_resultado_completo
      - get_resultados
      - get_totales_territorio
      - get_votos_partido
  - title: Voto exterior (CERA)
    contents:
      - get_cera_resumen
      - get_cera_votos
  - title: Utilidades
    contents:
      - get_health
  - title: Configuración avanzada
    desc: >
      Funciones para apuntar el paquete a una instancia propia de la API.
      Ver `vignette("autodespliegue")` para más detalles.
    contents:
      - edb_set_base_url
      - edb_get_base_url

footer:
  structure:
    left: [developed_by, sep_branding]
    right: [license, built_with]
  components:
    license: >
      Licenciado bajo <a href="https://www.gnu.org/licenses/gpl-3.0" target="_blank" rel="noopener">GPL-3</a>.
